server:
  port: 8223
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

spring:
  application:
    name: post-robot-system

  datasource:
    url: jdbc:mysql://localhost:3306/post_robot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 5000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  flyway:
    enabled: false

mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    enable-sql-runner: true
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.lu.postrobotsystem: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'


# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.lu.postrobotsystem.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  production: false  # 生产环境设为 true 关闭 Swagger
  setting:
    language: zh_cn

# ==================== JWT 配置 ====================
jwt:
  secret: post-robot-jwt-secret-key-2026
  access-expiration: 1800    # accessToken 过期时间，30分钟，单位秒
  refresh-expiration: 604800 # refreshToken 过期时间，7天，单位秒

# 邮政接口配置
postal:
  mock:
    enabled: true
  api:
    base-url: https://yyqduat.11185.cn/ptfwApi/getMessage
    connect-timeout: 5000
    read-timeout: 10000
    retry-count: 3
    sign-secret: dcff43b0fea660914aAFHElVnrq8
  platform:
    code: POSTR
    org-code: AHFY01
    desk-code: ROBOT01
    src-sys-id: POSTR
    dst-sys-id: XYDYYQDXT

# 支付轮询配置
payment:
  polling:
    enabled: true            # 是否启用支付状态轮询
    interval-ms: 30000        # 轮询间隔（毫秒）

# 订单超时配置
order:
  timeout:
    enabled: true             # 是否启用订单超时处理任务
    minutes: 30               # 订单超时时间（分钟）