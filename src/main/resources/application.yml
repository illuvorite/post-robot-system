server:
  port: 8080

spring:
  application:
    name: post-robot-system

  datasource:
    url: jdbc:mysql://localhost:3306/post_robot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.lu.postrobotsystem: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

# ==================== 业务配置 ====================
post-robot:
  stock:
    low-stock-threshold: 10
  postal:
    mock:
      enabled: true
      base-url: http://localhost:8088/mock/postal
    real:
      base-url: https://yyqduat.11185.cn/ptfwApi
    sign:
      secret-key: dcff43b0fea660914aAFHElVnrq8
    transaction:
      platform-code: "00001"
    timeout:
      connect: 5000
      read: 10000
    retry:
      max-attempts: 3
      backoff-delay: 1000
